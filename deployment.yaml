apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-app-deployment
  labels:
    app: health-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-app
  template:
    metadata:
      labels:
        app: health-app
    spec:
      containers:
        - name: health-app
          image: health_app-hapi-fhir:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080    # <-- corrigé pour correspondre à Tomcat
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://hapi-fhir-postgres:5432/hapi
            - name: SPRING_DATASOURCE_USERNAME
              value: admin
            - name: SPRING_DATASOURCE_PASSWORD
              value: admin
          readinessProbe:
            httpGet:
              path: /fhir/metadata
              port: 8080            # <-- corrigé
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /fhir/metadata
              port: 8080            # <-- corrigé
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 2