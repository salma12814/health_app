apiVersion: apps/v1
kind: Deployment
metadata:
  name: hapi-fhir-postgres
  labels:
    app: hapi-fhir-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hapi-fhir-postgres
  template:
    metadata:
      labels:
        app: hapi-fhir-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: hapi
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: admin
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}